<!-- path: public/scripts/extensions/third-party/st-message-memory/comment-modal.html -->
<div id="st-mm-comment-modal" class="st-mm-modal-overlay" style="display: none;">
    <div class="st-mm-modal-content st-mm-comment-box">
        <div class="st-mm-modal-header">
            <h2>เขียนคอมเมนต์</h2>
            <button class="st-mm-close-btn" id="st-mm-close-comment">&times;</button>
        </div>
        <div class="st-mm-modal-body">
            <input type="text" id="st-mm-comment-title" placeholder="หัวข้อ (ไม่บังคับ)" autocomplete="off" />
            <textarea id="st-mm-comment-detail" placeholder="รายละเอียดคอมเมนต์ (บังคับ)" rows="4"></textarea>
            <input type="hidden" id="st-mm-comment-mesid" />
        </div>
        <div class="st-mm-modal-footer">
            <button id="st-mm-comment-cancel" class="st-mm-btn-secondary">ยกเลิก</button>
            <button id="st-mm-comment-save" class="st-mm-btn-primary">บันทึก</button>
        </div>
    </div>
</div>
